{% extends 'base.html' %}

{% block content %}

<div class="row text-start m-lg-4">
    <div class="col-lg-9 col-md-6 col-sm-12">
        <div class="card md-4 w-50 box-shodow">
            <div class="card-header">
                <h5 class="my-0 font-weight-normal">Личный кабинет пользователя {{ users.email }}</h5>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <h5 class="my-1 font-weight-normal">{{ contact.name }}</h5>
                    <tr>
                        <td class="w-25">Адрес:</td>
                        <td>{{ contact.address }}</td>
                    </tr>
                    <tr>
                        <td class="w-25">Телефон:</td>
                        <td>{{ contact.phone }}</td>
                    </tr>
                    <tr>
                        <td class="w-25">Email:</td>
                        <td>{{ contact.email }}</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 col-sm-12">
        <div class="card mb-4 box-shadow">

        </div>
    </div>
</div>

{% endblock %}
