{% extends 'base.html' %}
{% load my_tags %}

{% block content %}

<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4 fw-medium">{{ product.name }}</h1>
</div>

<div class="container">
    <div class="col">

        <div class="card shadow-sm">
            <div class="card-body">
                {% if product.image %}
                    <img class="rounded mx-auto d-block" src="{{ product.image | media_filter }}" width="600" alt="def">
                {% endif %}
                <p>{{ product.description }}</p>
                <p>{{ product.category }}</p>
                <p><strong>{{ product.price }} ₽</strong></p>
                <p class="mt-3">Количество просмотров: {{ product.views_count }}</p>
                <div class="btn-group">
                    <a class="btn btn-secondary" href="{% url 'catalog:product_list' %}" role="button">Назад</a>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
