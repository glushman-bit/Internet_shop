<nav aria-label="Page navigation example">
    <ul class="pagination justify-content-center">

        {% if page_object.has_previous %}
            <li class="page-item">
                <a class="page-link" href="?page={{ page_object.previous_page_number }}" aria-label="Previous">
                    <span aria-hidden="true">назад</span>
                </a>
            </li>
        {% else %}
            <li class="page-item disabled">
                <span class="page-link">назад</span>
            </li>
        {% endif %}

        {% for page_num in page_object.paginator.page_range %}
            <li class="page-item {% if page_object.number == page_num %}active{% endif %}">
                <a class="page-link" href="?page={{ page_num }}">{{ page_num }}</a>
            </li>
        {% endfor %}

        {% if page_object.has_next %}
            <li class="page-item">
                <a class="page-link" href="?page={{ page_object.next_page_number }}" aria-label="Next">
                    <span aria-hidden="true">вперед</span>
                </a>
            </li>
        {% else %}
            <li class="page-item disabled">
                <span class="page-link">вперед</span>
            </li>
        {% endif %}
    </ul>
</nav>
