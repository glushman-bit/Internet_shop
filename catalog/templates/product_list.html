{% extends 'base.html' %}
{% load my_tags %}

{% block content %}

{% include 'includes/home_header.html' %}

<div class="container">
    <div class="row">
        {% for product in page_object %}
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5>{{ product.name }}</h5>
                        <img src="{{ product.image | media_filter }}" width="200px" height="150" alt="def">
                        <p>{{ product.description|truncatechars:100 }}</p>
                        <div class="btn-group">
                            <a class="btn btn-primary" href="{% url 'catalog:product_detail' product.pk %}" role="button">Подробнее</a>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>

{% include 'includes/inc_page.html' %}
{% endblock %}
